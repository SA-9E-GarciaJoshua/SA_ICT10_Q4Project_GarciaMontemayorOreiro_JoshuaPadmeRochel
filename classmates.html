<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10 EMERALD - Classmates</title>

    <link rel="stylesheet" href="style.css">

    <!-- PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #fff9ef 0%, #fff2df 100%);
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Comic Neue', sans-serif;
            position: relative;
            min-height: 100vh;
        }

        body::before {
            content: "🐰🐱🐻‍❄️⭐🍜";
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 75px;
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: "✨🌸⚡🐣🍙💫";
            position: fixed;
            top: 100px;
            left: 15px;
            font-size: 65px;
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
            transform: rotate(-5deg);
        }

        /* Navbar */
        .navbar {
            background: #fdebb3 !important;
            border-bottom: 4px solid #f7bc45;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 2rem;
            flex-wrap: wrap;
        }

        .navbar .logo {
            background: #fff2df;
            border-radius: 50px;
            padding: 5px 20px;
            font-weight: bold;
            color: #b45f1b;
            box-shadow: inset 0 -1px 0 #ffe0aa, 0 3px 8px rgba(0,0,0,0.03);
            font-size: 1.5rem;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 15px;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: #a5662a !important;
            font-weight: 600;
            background: #fff5ea;
            border-radius: 30px;
            padding: 6px 16px;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .nav-links a:hover, .nav-links a.active {
            background: #ffdead !important;
            color: #8b4c1a !important;
            transform: translateY(-2px);
        }

        /* Hero Section */
        .hero-section {
            background: #ffe6bf;
            border-radius: 50px;
            margin: 25px 30px;
            padding: 20px 25px;
            box-shadow: 0 12px 18px rgba(0,0,0,0.05);
            border: 2px solid #ffd29b;
            position: relative;
            z-index: 2;
        }

        .hero-section h1 {
            color: #c16f2e;
            text-shadow: 2px 2px 0 #ffeecc;
            font-size: 2rem;
        }

        .hero-section p {
            color: #9b5e2a;
            font-size: 1.1rem;
        }

        /* Form Container */
        .form-container {
            background: #fff7ed;
            border-radius: 48px;
            padding: 30px;
            margin: 20px 30px 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            border: 1px solid #ffdead;
            position: relative;
            z-index: 2;
        }

        .form-container input {
            background: #fffef7;
            border: 2px solid #ffd7a5;
            border-radius: 60px;
            padding: 10px 18px;
            font-size: 1rem;
            width: 100%;
            max-width: 350px;
            margin-right: 10px;
            margin-bottom: 15px;
            transition: 0.2s;
        }

        .form-container input:focus {
            border-color: #f7a81e;
            outline: none;
            box-shadow: 0 0 0 3px rgba(247,168,30,0.2);
        }

        .form-container button {
            background: #f7c56e;
            border: none;
            border-radius: 60px;
            padding: 10px 24px;
            margin: 5px 10px 5px 0;
            font-weight: bold;
            color: #784a17;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 3px 0 #c2812e;
            font-size: 1rem;
        }

        .form-container button:hover {
            background: #ffbc4a;
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #c2812e;
        }

        #output {
            margin-top: 25px;
        }

        #output div {
            background: #fff3e4 !important;
            border-left: 6px solid #f7bc45 !important;
            border-radius: 20px !important;
            padding: 12px 18px !important;
            margin-bottom: 12px !important;
            box-shadow: 0 4px 10px rgba(0,0,0,0.04);
            font-weight: 500;
            color: #7a4512;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">10 EMERALD</div>

        <ul class="nav-links">
            <li><a href="classmates.html" class="active">Classmates</a></li>
            <li><a href="attendance.html">Attendance Tracker</a></li>
            <li><a href="index.html">Gallery</a></li>
        </ul>
    </nav>

    <!-- HERO -->
    <header class="hero-section">
        <h1>Classmates</h1>
        <p>Remember your clasmates.</p>
    </header>

    <!-- FORM -->
    <section class="form-container">

        <input type="text" id="classmate1" placeholder="Enter Name">
        <input type="text" id="section" placeholder="Enter Section">
        <input type="text" id="subject" placeholder="Favorite Subject">

        <button py-click="add_classmate">Add Classmate</button>
        <button py-click="show_classmates">Show Classmates</button>

        <div id="output"></div>

    </section>

    <py-script src="classmates.py"></py-script>

</body>
</html>
